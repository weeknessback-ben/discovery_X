<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10161f"/><stop offset="1" stop-color="#0c1016"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4ea1ff"/>
    </marker>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="8" y="8" width="1264" height="624" rx="20" fill="none" stroke="#2a3340"/>

  <!-- title -->
  <text x="640" y="150" text-anchor="middle" font-size="76" font-weight="800" fill="#ffffff">discovery<tspan fill="#4ea1ff">_X</tspan></text>
  <text x="640" y="196" text-anchor="middle" font-size="23" font-weight="600" fill="#d7dee6">AI-guided autonomous discovery &amp; recon <tspan fill="#8593a3">— for</tspan> <tspan fill="#2bd66a">authorized</tspan> <tspan fill="#8593a3">pentesting</tspan></text>

  <!-- pipeline (centered) -->
  <g transform="translate(80,300)">
    <g stroke="#4ea1ff" stroke-width="2" marker-end="url(#arr)">
      <line x1="228" y1="56" x2="268" y2="56"/><line x1="463" y1="56" x2="503" y2="56"/>
      <line x1="698" y1="56" x2="738" y2="56"/><line x1="933" y1="56" x2="973" y2="56"/>
    </g>

    <g transform="translate(40,0)">
      <rect width="180" height="112" rx="12" fill="#171c24" stroke="#2a3340"/>
      <g transform="translate(90,34)" stroke="#4ea1ff" stroke-width="2" fill="none">
        <circle r="16"/><circle r="9"/><circle r="3" fill="#4ea1ff" stroke="none"/>
        <line x1="-22" y1="0" x2="-18" y2="0"/><line x1="18" y1="0" x2="22" y2="0"/>
        <line x1="0" y1="-22" x2="0" y2="-18"/><line x1="0" y1="18" x2="0" y2="22"/>
      </g>
      <text x="90" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Target</text>
      <text x="90" y="99" text-anchor="middle" font-size="12" fill="#8593a3">in-scope only</text>
    </g>

    <g transform="translate(275,0)">
      <rect width="180" height="112" rx="12" fill="#171c24" stroke="#2a3340"/>
      <g transform="translate(90,34)">
        <rect x="-20" y="-16" width="40" height="32" rx="5" fill="none" stroke="#2bd66a" stroke-width="2"/>
        <text x="0" y="6" text-anchor="middle" font-size="15" font-weight="700" fill="#2bd66a" font-family="ui-monospace, monospace">&lt;/&gt;</text>
      </g>
      <text x="90" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Crawl + JS</text>
      <text x="90" y="99" text-anchor="middle" font-size="12" fill="#8593a3">hidden endpoints</text>
    </g>

    <g transform="translate(510,0)">
      <rect width="180" height="112" rx="12" fill="#171c24" stroke="#2a3340"/>
      <g transform="translate(90,34)">
        <rect x="-24" y="-15" width="48" height="7" rx="3.5" fill="#ff9c9c"/>
        <rect x="-24" y="-3.5" width="36" height="7" rx="3.5" fill="#ffd87a"/>
        <rect x="-24" y="8" width="44" height="7" rx="3.5" fill="#9cc7ff"/>
      </g>
      <text x="90" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Fingerprint</text>
      <text x="90" y="99" text-anchor="middle" font-size="12" fill="#8593a3">stack + version</text>
    </g>

    <g transform="translate(745,0)">
      <rect width="180" height="112" rx="12" fill="#171c24" stroke="#2a3340"/>
      <g transform="translate(90,34)">
        <rect x="-17" y="-17" width="34" height="34" rx="7" fill="#2d2350" stroke="#8b5cf6" stroke-width="2"/>
        <text x="0" y="6" text-anchor="middle" font-size="14" font-weight="800" fill="#c9b6ff">AI</text>
        <g stroke="#8b5cf6" stroke-width="2">
          <line x1="-17" y1="-8" x2="-24" y2="-8"/><line x1="-17" y1="8" x2="-24" y2="8"/>
          <line x1="17" y1="-8" x2="24" y2="-8"/><line x1="17" y1="8" x2="24" y2="8"/>
          <line x1="-8" y1="-17" x2="-8" y2="-24"/><line x1="8" y1="-17" x2="8" y2="-24"/>
          <line x1="-8" y1="17" x2="-8" y2="24"/><line x1="8" y1="17" x2="8" y2="24"/>
        </g>
      </g>
      <text x="90" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">AI brain</text>
      <text x="90" y="99" text-anchor="middle" font-size="12" fill="#8593a3">OpenAI · LiteLLM</text>
    </g>

    <g transform="translate(980,0)">
      <rect width="180" height="112" rx="12" fill="#171c24" stroke="#2a3340"/>
      <g transform="translate(90,34)" stroke="#4ea1ff" stroke-width="2">
        <line x1="-18" y1="-12" x2="6" y2="2"/><line x1="6" y1="2" x2="20" y2="-12"/>
        <line x1="6" y1="2" x2="0" y2="18"/>
        <circle cx="-18" cy="-12" r="5" fill="#1f3a5f"/>
        <circle cx="6" cy="2" r="6" fill="#2bd66a" stroke="#2bd66a"/>
        <circle cx="20" cy="-12" r="5" fill="#1f3a5f"/>
        <circle cx="0" cy="18" r="5" fill="#1f3a5f"/>
      </g>
      <text x="90" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Attack graph</text>
      <text x="90" y="99" text-anchor="middle" font-size="12" fill="#8593a3">asset relations</text>
    </g>
  </g>

  <!-- badges (centered) -->
  <g transform="translate(258,500)" font-size="14" font-weight="600">
    <g><rect width="152" height="32" rx="16" fill="#14463a" stroke="#1f6b54"/><path d="M20 7 l8 2.6 v5 c0 4.6 -3.4 7.2 -8 8.7 c-4.6 -1.5 -8 -4.1 -8 -8.7 v-5 z" fill="none" stroke="#7af0c0" stroke-width="1.8"/><text x="94" y="21" text-anchor="middle" fill="#7af0c0">scope-gated</text></g>
    <g transform="translate(166,0)"><rect width="160" height="32" rx="16" fill="#1f2630" stroke="#2a3340"/><text x="80" y="21" text-anchor="middle" fill="#d7dee6">OWASP-hardened</text></g>
    <g transform="translate(340,0)"><rect width="150" height="32" rx="16" fill="#1f2630" stroke="#2a3340"/><text x="75" y="21" text-anchor="middle" fill="#d7dee6">Multi-provider AI</text></g>
    <g transform="translate(504,0)"><rect width="98" height="32" rx="16" fill="#1f2630" stroke="#2a3340"/><text x="49" y="21" text-anchor="middle" fill="#d7dee6">Docker</text></g>
  </g>
</svg>
